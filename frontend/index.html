<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyDeal</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <style>
    :root {
      --neutral-900: hsl(0, 0%, 7%);
      --neutral-800: hsl(0, 0%, 15%);
      --neutral-700: hsl(0, 0%, 23%);
      --neutral-600: hsl(0, 0%, 51%);
      --neutral-500: hsl(240, 3%, 46%);
      --neutral-400: hsl(240, 1%, 59%);
      --neutral-300: hsl(0, 0%, 93%);
      --neutral-200: hsl(0, 0%, 98%);
      --neutral-0: hsl(0, 0%, 100%);

      --blue-600: hsl(214, 100%, 55%);
      --blue-400: hsl(210, 100%, 65%);
    }

    /* 2. General styles **********************************************************************
    *******************************************************************************************/
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    /* 3. Utility classes ********************************************************************
    *******************************************************************************************/
    .visually-hidden {
      position: absolute;       /* Remove from the normal document flow */
      width: 1px;               /* Set to a minimum size for screen reader detection */
      height: 1px;
      padding: 0;
      margin: -1px;             /* Offset the 1px size to avoid affecting layout */
      overflow: hidden;         /* Hide anything that overflows the 1px box */
      clip: rect(0, 0, 0, 0);   /* Legacy clipping for older browsers */
      clip-path: inset(50%);    /* Modern clipping method */
      white-space: nowrap;      /* Prevent words from wrapping weirdly */
      border: 0;
    }
    .disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* 4. Layout ******************************************************************************
    *******************************************************************************************/
    .container {
      width: min(90%, 75rem);
      margin: 0 auto;
    }

    /* 4.1 Header *****************************************************************************
    *******************************************************************************************/
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1em;
      padding: 1em;
      margin-block: 1.5em;
      background-color: var(--neutral-300);
      border-radius: 8px;

      color: var(--neutral-700);
    }

    /* 4.2 Search bar ***************************************************************************
    *********************************************************************************************/
    form {
      flex: 1;
    }
    .search-input {
      width: 100%;
      padding: 0.5em 1em;
      padding-left: 1.75em; /* Space for the search icon */
      border-radius: 8px;
      background-color: var(--neutral-200);
      border: none;
      font-size: 1.1rem;
      anchor-name: --search-input;

      &::placeholder {
        color: var(--neutral-400);
      }
    }
    .search-icon {
      position-anchor: --search-input;
      position: absolute;
      left: calc(anchor(left) + 0.5em);
      align-self: anchor-center;
      color: var(--neutral-400);
      pointer-events: none;
    }

    /* 4.3 Navigation ***************************************************************************
    *********************************************************************************************/
    nav ul {
      display: flex;
      gap: 1.5em;
    }
    .service-link {
      @media (min-width: 600px) {
        padding: 0.5em 1em;
        background-color: var(--neutral-200);
        border-radius: 8px;
      }
    }

    nav span {
      display: none;
      @media (min-width: 600px) {
        display: inline;
      }
    }

    nav img {
      width: 25px;
      @media (min-width: 600px) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a aria-label="Home" href="#">
        <img src="assets/images/logos/logo-light-rect.png" alt="Easy Deal" width="200" height="50">
      </a>
      <form>
        <label for="search" class="visually-hidden">Search for products</label>
        <input type="search" id="search" placeholder="Search..." class="search-input" name="search">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>
      </form>
      <nav>
        <ul>
          <li>
            <a aria-label="Browse" href="#" class="browse-link">
              <span>Browse</span>
              <img src="assets/icons/shop.svg" alt="">
            </a>
          </li>
          <li>
            <a aria-label="List your service" href="#" class="service-link disabled">
              <span>List your service</span>
              <img src="assets/icons/bag-plus-fill.svg" alt="">
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>
</body>
</html>
