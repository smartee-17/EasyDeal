<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Easy Deal</title>
        <link rel="stylesheet" href="../shared/global.css" />
        <link rel="stylesheet" href="homepage.css" />
    </head>
    <body>
        <header class="header">
            <img
                src="../assets/images/logos/logo-light-rect.svg"
                alt="Easy Deal logo"
                class="header__img"
            />
            <input type="search" class="header__search" placeholder="search" />
        </header>
        <main class="homepage">
            <section class="hero">
                <div class="hero__latest">
                    <h1 class="hero__heading">
                        The New MacBook Pro. Supercharged by M3.
                    </h1>
                    <p class="hero__paragraph">
                        Mind-blowing speed. Liquid Retina XDR display. Up to 22
                        hours of battery life. The pro laptop you’ve been
                        waiting for.
                    </p>
                    <button class="hero__btn">Shop the Pro</button>
                </div>
            </section>
            <nav class="category-bar" aria-label="Product Categories">
                <ul class="category-bar__list"></ul>
            </nav>
            <section class="products"></section>
        </main>

        <script src="../shared/utils.js"></script>
        <script src="homepage.js"></script>
    </body>
</html>
