<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicons/favicon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="auth.css">
  <script defer src="auth.js" type="module"></script>
  <title>Log In</title>
</head>
<body class="page">
  <main class="login">
    <div class="login__logo"></div>
    <form class="login__form">
      <label for="username" class="u-visually-hidden">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" class="login__form__username-input">
      <label for="password" class="u-visually-hidden">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" class="login__form__password-input">
      <button type="submit" class="login__form__submit-button">Login</button>
      <p class="login__error-msg"></p>
    </form>
  </main>
</body>
</html>
