<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicons/favicon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="auth.css">
  <script defer src="auth.js"></script>
  <title>Log In</title>
</head>
<body class="page">
  <main class="signin">
    <img src="../assets/images/logos/logo-light-rect.png" alt="Easy deal" class="logo signin__logo" width="200" height="50">
    <form class="signin__form">
      <input type="text" placeholder="Username" class="signin__form__username-input">
      <input type="password" placeholder="Password" class="signin__form__password-input">
      <button type="submit" class="signin__form__submit-button">Login</button>
    </form>
  </main>
</body>
</html>
