<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/frontend/assets/images/favicons/favicon-32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/shared/global.css">
  <link rel="stylesheet" href="/frontend/Auth/auth.css">
  <script defer src="/frontend/Auth/auth.js" type="module"></script>
  <title>Log In</title>
</head>
<body class="page">
  <main class="login">
    <div class="login__logo" role="img" aria-label="Easy Deal Logo"></div>
    <h1 class="login__title">Log In</h1>
    <form class="login__form">
      <section class="login__form__field">
        <label for="username">Username</label>
        <input type="text"
               id="username"
               name="username"
               placeholder="Username"
               autocomplete="username"
               class="login__form__username-input">
    </section>
      <section class="login__form__field">
        <label for="password">Password</label>
        <input type="password" 
               id="password"
               name="password"
               placeholder="Password"
               autocomplete="current-password"
               class="login__form__password-input">
      </section>
      <button type="submit" class="login__form__submit-button">Login</button>
      <p class="login__error-msg"></p>
    </form>
  </main>
</body>
</html>
