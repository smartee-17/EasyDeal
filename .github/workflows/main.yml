name: Backend CI

on:
  push:
    branches: ["main", "setup-github-actions"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Test database connection and Product CRUD
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_TEST_URI: mongodb://127.0.0.1:27017/easydeal_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RUN_RESEND_TEST: ${{ secrets.RUN_RESEND_TEST }}
          PORT: ${{ vars.PORT }}
        run: npm test
        working-directory: ./backend

      - name: Upload HTML test report 
        uses: actions/upload-artifact@v4
        with: 
          name: html-report
          path: ./backend/html-report/

      - name: Upload JUnit report 
        uses: actions/upload-artifact@v4
        with: 
          name: junit-report
          path: ./backend/junit/

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./backend/html-report
    
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v5


