name: Backend CI

on:
  push:
    branches: ["main", "setup-github-actions"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Test database connection
        env:
          # These pull from the Secrets/Variables you added in the UI
          MONGO_URI: ${{ secrets.MONGO_URI }}
          PORT: ${{ vars.PORT }}
        run: npm test
        working-directory: ./backend
