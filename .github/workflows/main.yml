name: Backend CI

on:
  push:
    branches: ["main", "setup-github-actions"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package.json"

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Test database connection and Product CRUD
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_TEST_URI: mongodb://127.0.0.1:27017/easydeal_test
          PORT: ${{ vars.PORT }}
        run: npm test
        working-directory: ./backend
